name: Release

# 推送 v* 形式的版本 tag（如 v0.2.0）时自动构建并创建 GitHub Release。
# tag 中的版本号必须与 src-tauri/tauri.conf.json 的 version 一致（用 scripts/bump-version.mjs 保证）。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 允许 GITHUB_TOKEN 创建 Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $conf = Get-Content -Raw src-tauri/tauri.conf.json | ConvertFrom-Json
          if ($conf.version -ne $tag) {
            throw "Tag v$tag 与 tauri.conf.json 版本 $($conf.version) 不一致，请先运行 node scripts/bump-version.mjs $tag"
          }
          $notes = Get-Content -Raw RELEASE_NOTES.md
          if ($notes -notmatch [regex]::Escape("v$tag")) {
            throw "RELEASE_NOTES.md 未包含当前版本 v$tag 的发布说明，请先更新该文件"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # 发布说明（RELEASE_NOTES.md）同时写入草稿正文与 latest.json 的 notes（应用内更新弹窗展示的内容）
      - name: Read release notes
        id: notes
        shell: pwsh
        run: |
          "body<<RELEASE_NOTES_EOF" >> $env:GITHUB_OUTPUT
          Get-Content -Raw RELEASE_NOTES.md >> $env:GITHUB_OUTPUT
          "RELEASE_NOTES_EOF" >> $env:GITHUB_OUTPUT

      # tauri-action 在 tag 推送触发时创建 Release 并上传 NSIS/MSI 安装包；
      # 检测到签名私钥时会同时生成签名更新包与 latest.json（应用内一键更新依赖它）。
      # releaseDraft 置为草稿以便检查后再发布；确认无误后在 Releases 页面手动 Publish，
      # 想全自动发布则改为 false。
      - name: Build and create GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 必须显式给出 tagName，否则 tauri-action 跳过 Release 创建与产物上传
          tagName: v__VERSION__
          releaseName: 'SnapCode v__VERSION__'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # latest.json 明确选用 MSI（原位升级；NSIS 会装出第二份），false 也是 tauri-action 默认值
          updaterJsonPreferNsis: false
